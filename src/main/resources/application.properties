### KONFIGURACJA BAZY DANYCH H2 ###
# Adres bazy danych (działa w pamięci RAM)
spring.datasource.url=jdbc:h2:mem:przychodniadb
spring.datasource.driverClassName=org.h2.Driver
# Domyślny użytkownik i brak hasła
spring.datasource.username=sa
spring.datasource.password=

### KONSOLA H2 ###
# Włączenie panelu administracyjnego w przeglądarce
spring.h2.console.enabled=true
# Ścieżka, pod którą będzie dostępna konsola
spring.h2.console.path=/h2-console

### KONFIGURACJA JPA / HIBERNATE ###
# Ustawienie odpowiedniego dialektu dla H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Automatyczne tworzenie i aktualizowanie tabel na podstawie Twoich klas Encji
spring.jpa.hibernate.ddl-auto=update
# Wypisywanie zapytań SQL w konsoli VS Code (bardzo pomaga w szukaniu błędów)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

### OMIJANIE BŁĘDU OPEN-IN-VIEW ###
# Dobra praktyka wyłączająca ostrzeżenie w logach Springa
spring.jpa.open-in-view=false